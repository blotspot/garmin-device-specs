name: Generate Daily Data
on:
  # run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # or manually trigger the workflow
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Script
        run: |
          python parse.py

      - name: Commit and Push Changes
        id: push_and_signal
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add garmin_devices.json garmin_devices.md

          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Automated daily data generation"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages Deploy
        if: steps.push_and_signal.outputs.pushed == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "deploy-static",
              client_payload: { source: "daily-generator" }
            })
